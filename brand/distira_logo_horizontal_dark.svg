    </g>
    <text x="620" y="350" fill="#EAF1FF" font-size="180" font-family="Inter, SF Pro Display, Arial, Helvetica, sans-serif" font-weight="600" letter-spacing="10">DISTIRA</text>
    <text x="626" y="428" fill="#9FB3D1" font-size="46" font-family="Inter, SF Pro Text, Arial, Helvetica, sans-serif" font-weight="400" letter-spacing="1.5">Compile the smallest useful context before every LLM call</text>
  </g>
