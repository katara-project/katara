      <stop offset="55%" stop-color="#11B9FF"/>
      <stop offset="100%" stop-color="#7EE7FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- outer press frame -->
