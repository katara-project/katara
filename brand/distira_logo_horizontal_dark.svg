             C370 258 360 268 348 268
             H164
             C152 268 142 258 142 246
             C142 234 152 224 164 224 Z"
          fill="url(#blue)"/>
    <path d="M176 272
             H336
             C348 272 358 282 358 294
             C358 306 348 316 336 316
             H176
