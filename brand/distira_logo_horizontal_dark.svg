    <rect x="90" y="178" width="42" height="118" rx="8" fill="url(#metal)"/>
    <rect x="380" y="178" width="42" height="118" rx="8" fill="url(#metal)"/>

    <!-- screw -->
    <rect x="243" y="62" width="26" height="66" rx="7" fill="url(#metal)"/>
    <rect x="228" y="46" width="56" height="24" rx="8" fill="url(#metal)"/>
    <rect x="210" y="128" width="92" height="30" rx="12" fill="url(#metal)"/>
  </g>

