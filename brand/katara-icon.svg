<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#0b0f14"/>
    </linearGradient>
    <linearGradient id="k" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39d3ff"/>
      <stop offset="100%" stop-color="#8c6dff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#39d3ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8c6dff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- subtle glow -->
  <ellipse cx="256" cy="180" rx="160" ry="120" fill="url(#glow)"/>
  <!-- K letterform -->
  <text
    x="256" y="340"
    text-anchor="middle"
    font-family="Inter, system-ui, sans-serif"
    font-weight="800"
    font-size="320"
    fill="url(#k)"
    letter-spacing="-8"
  >K</text>
  <!-- thin accent ring -->
  <rect x="24" y="24" width="464" height="464" rx="80"
    fill="none" stroke="url(#k)" stroke-width="2" opacity="0.15"/>
</svg>
