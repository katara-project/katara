---
# DISTIRA routing configuration
#
# Maps detected intents to providers declared in providers.yaml.
# sensitive_override forces all sensitive requests to a local provider.
# Provider names must match keys in providers.yaml exactly.

routing:
  strategy: hybrid
  default_provider: openrouter-step-3.5-flash-cloud
  fallback_provider: ollama-llama3
  sensitive_override: ollama-llama3       # sensitive data NEVER leaves local

  task_routing:
    # ── Code review / refactor → best local code model ──
    review: ollama-qwen2.5-coder
     # ── Code generation / snippets → dedicated codegen intent ──
    codegen: ollama-qwen2.5-coder
    # ── Debug / stack traces → local Mistral 7B ─────────
    debug: ollama-mistral-7b-instruct
    # ── Summarization → best free cloud (24B quality) ───
    summarize: openrouter-mistral-small-3.1-24b-instruct-cloud    # ── Translation → multilingual cloud model ──────────
    translate: openrouter-mistral-small-3.1-24b-instruct-cloud    # ── General queries → StepFun Flash free cloud ──────
    general: openrouter-step-3.5-flash-cloud
    # ── OCR → cloud Mistral OCR (best accuracy) ─────────
    ocr: mistral-ocr-2512-cloud
