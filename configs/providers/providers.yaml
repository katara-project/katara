---
# DISTIRA provider configuration
#
# Each provider defines a connection to an LLM endpoint.
# DISTIRA supports any OpenAI-compatible endpoint:
#   Ollama · LM Studio · OpenWebUI · Mistral · OpenAI · Anthropic · Google …
#
# Supported types: openai-compatible, mistral
# The base_url must point to the OpenAI-compatible root (NOT ending in /chat).
#
# cost_per_1k_input_tokens / cost_per_1k_output_tokens  (USD)
#   On-prem: effectively $0 (set to 0.0 — electricity cost only).
#   Cloud:   use the provider's public pricing page.

providers:
  # ── Ollama (on-prem, http://localhost:11434/v1) ──────────────────────────────
  # Install: https://ollama.com  |  pull models with: ollama pull <model>

  ollama-llama3:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: llama3:latest
    deployment: on-prem
    description: Llama 3 8B — general tasks, summarization
    quality_tier: standard
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  ollama-llama3.3:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: llama3.3:latest
    deployment: on-prem
    description: "Llama 3.3 70B — best open-source general model (Meta, 2025). ollama pull llama3.3"
    quality_tier: high
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  ollama-qwen2.5-coder:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    deployment: on-prem
    description: Qwen 2.5 Coder 7B — code generation, review
    quality_tier: high
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  # ollama-qwen3:
  #   type: openai-compatible
  #   base_url: http://localhost:11434/v1
  #   model: qwen3:8b
  #   deployment: on-prem
  #   description: "Qwen 3 8B — Alibaba 2025, MoE hybrid, strong reasoning. ollama pull qwen3:8b"
  #   cost_per_1k_input_tokens: 0.0
  #   cost_per_1k_output_tokens: 0.0

  ollama-mistral-7b-instruct:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: mistral:7b-instruct
    deployment: on-prem
    description: Mistral 7B local — debug, analysis
    quality_tier: standard
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  ollama-deepseek-ocr:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: deepseek-ocr:3b
    deployment: on-prem
    description: DeepSeek OCR 3B — optical character recognition
    quality_tier: low
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  # ollama-glm4:
  #   type: openai-compatible
  #   base_url: http://localhost:11434/v1
  #   model: glm4:9b
  #   deployment: on-prem
  #   description: "ZhipuAI GLM-4 9B — strong on Chinese + code. ollama pull glm4:9b"
  #   cost_per_1k_input_tokens: 0.0
  #   cost_per_1k_output_tokens: 0.0

  # ── vLLM (on-prem, http://localhost:8000/v1) ─────────────────────────────────
  # Install: pip install vllm  |  start: python -m vllm.entrypoints.openai.api_server --model <hf-model>
  # vLLM exposes a full OpenAI-compatible API — DISTIRA connects transparently,
  # including streaming (SSE).  No api_key needed for local deployments.
  #
  # vllm-default:
  #   type: openai-compatible
  #   base_url: http://localhost:8000/v1
  #   model: meta-llama/Llama-3.1-8B-Instruct  # replace with your loaded model
  #   deployment: on-prem
  #   description: vLLM local server — any HuggingFace model with PagedAttention
  #   cost_per_1k_input_tokens: 0.0
  #   cost_per_1k_output_tokens: 0.0

  # ── LM Studio (on-prem, http://localhost:1234/v1) ────────────────────────────
  # Install: https://lmstudio.ai  |  load any GGUF model, enable the local server
  # LM Studio exposes a full OpenAI-compatible API — DISTIRA connects transparently.
  #
  # lmstudio-default:
  #   type: openai-compatible
  #   base_url: http://localhost:1234/v1
  #   model: local-model          # replaced by whatever model is loaded in LM Studio
  #   deployment: on-prem
  #   description: LM Studio local server — any GGUF model (llama3, qwen3, gemma3, phi4 …)
  #   cost_per_1k_input_tokens: 0.0
  #   cost_per_1k_output_tokens: 0.0

  # ── OpenWebUI (on-prem, http://localhost:3000) ───────────────────────────────
  # Install: https://openwebui.com  |  OpenWebUI proxies Ollama and exposes its
  # own OpenAI-compatible API at /api — DISTIRA can target it directly.
  #
  # openwebui-default:
  #   type: openai-compatible
  #   base_url: http://localhost:3000/api
  #   model: llama3:latest        # or whatever model is active in OpenWebUI
  #   deployment: on-prem
  #   description: OpenWebUI proxy — targets its configured Ollama/backend model
  #   cost_per_1k_input_tokens: 0.0
  #   cost_per_1k_output_tokens: 0.0

  # ── Cloud providers (optional — uncomment + set API key env var) ─────────────

  mistral-ocr-2512-cloud:
    type: mistral
    base_url: https://api.mistral.ai/v1
    model: mistral-ocr-2512
    deployment: cloud
    api_key_env: MISTRAL_API_KEY
    description: Mistral OCR 2512 cloud endpoint
    quality_tier: high
    cost_per_1k_input_tokens: 0.001
    cost_per_1k_output_tokens: 0.001

  openrouter-step-3.5-flash-cloud:
    type: openai-compatible
    base_url: https://openrouter.ai/api/v1
    model: stepfun/step-3.5-flash:free
    deployment: cloud
    api_key_env: OPENROUTER_API_KEY
    description: StepFun 3.5 Flash free cloud
    quality_tier: standard
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  openrouter-mistral-small-3.1-24b-instruct-cloud:
    type: openai-compatible
    base_url: https://openrouter.ai/api/v1
    model: mistralai/mistral-small-3.1-24b-instruct:free
    deployment: cloud
    api_key_env: OPENROUTER_API_KEY
    description: Mistral Small 3.1 24B Instruct free cloud — summarize, translate
    quality_tier: high
    cost_per_1k_input_tokens: 0.0
    cost_per_1k_output_tokens: 0.0

  # ── OpenAI (cloud) ───────────────────────────────────────────────────────────
