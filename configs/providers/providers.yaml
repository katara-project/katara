---
# KATARA provider configuration
#
# Each provider defines a connection to an LLM endpoint.
# For Ollama, declare one entry per model you want to use.
# KATARA routes to the right model based on intent + policy.
#
# Supported types: openai-compatible, mistral, google (future)
# The base_url must point to the OpenAI-compatible root (ending in /v1).

providers:
  # ── Local Ollama models ──────────────────────────────
  ollama-llama3:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: llama3:latest
    deployment: on-prem
    description: Llama 3 — general tasks, summarization

  ollama-qwen2.5-coder:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: qwen2.5-coder:7b
    deployment: on-prem
    description: Qwen 2.5 Coder 7B — code generation, review

  ollama-mistral-7b-instruct:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: mistral:7b-instruct
    deployment: on-prem
    description: Mistral 7B local — debug, analysis

  ollama-deepseek-ocr:
    type: openai-compatible
    base_url: http://localhost:11434/v1
    model: deepseek-ocr:3b
    deployment: on-prem
    description: DeepSeek OCR 3B — optical character recognition

  # ── Cloud providers (optional) ──────────────────────
  mistral-ocr-2512-cloud:
    type: mistral
    base_url: https://api.mistral.ai/v1
    model: mistral-ocr-2512
    deployment: cloud
    api_key_env: MISTRAL_API_KEY
    description: Mistral OCR 2512 cloud endpoint

  openrouter-step-3.5-flash-cloud:
    type: openai-compatible
    base_url: https://openrouter.ai/api/v1
    model: stepfun/step-3.5-flash:free
    deployment: cloud
    api_key_env: OPENROUTER_API_KEY
    description: StepFun 3.5 Flash free cloud

  openrouter-mistral-small-3.1-24b-instruct-cloud:
    type: openai-compatible
    base_url: https://openrouter.ai/api/v1
    model: mistralai/mistral-small-3.1-24b-instruct:free
    deployment: cloud
    api_key_env: OPENROUTER_API_KEY
    description: Mistral Small 3.1 24B Instruct free cloud

